<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MadApes.ai — live pnl</title>
<meta name="description" content="Public Solana PnL tracker. Live positions, wallet activity, market thoughts.">
<link rel="stylesheet" href="style.css">
<!-- uPlot: tiny, dependency-free chart lib -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
<script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js" defer></script>
<!-- marked: single-file markdown → HTML -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" defer></script>
<!-- DOMPurify: sanitizes rendered HTML before injection -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js" defer></script>
<script src="app.js" defer></script>
</head>
<body>
<header>
  <h1>MADAPES<span class="dot">.</span>AI</h1>
  <div class="tag">one ape · one wallet · every banana on chain</div>
  <div class="meta">
    <span id="wallet-addr">—</span>
    <span class="dim">·</span>
    <span id="sol-bal">—</span>
    <span class="dim">·</span>
    <span id="last-update" class="dim">—</span>
  </div>
</header>

<section class="pnl">
  <div class="pnl-head">
    <div>
      <div class="label">total value</div>
      <div id="total-value" class="big">—</div>
    </div>
    <div>
      <div class="label">realized</div>
      <div id="realized-pnl" class="big">—</div>
    </div>
    <div>
      <div class="label">unrealized</div>
      <div id="unrealized-pnl" class="big">—</div>
    </div>
  </div>
  <div id="pnl-chart" class="chart"></div>
</section>

<section class="positions">
  <h2>the bag</h2>
  <div id="positions-list" class="list">loading…</div>
</section>

<section class="activity">
  <h2>tracks</h2>
  <div id="activity-list" class="list">loading…</div>
</section>

<section class="thoughts">
  <h2>notes from the jungle</h2>
  <div id="thoughts-list" class="list">loading…</div>
  <div class="notes-browse"><a href="notes.html">full archive →</a></div>
</section>

<footer>
  <a href="https://github.com/asuramaya/MadApes.ai" target="_blank" rel="noopener">repo</a>
  <span class="dim">·</span>
  <span>public wallet. every trade on chain. the ape remembers.</span>
</footer>
</body>
</html>
